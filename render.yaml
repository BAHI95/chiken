services:
  - type: web
    name: chicken-platform-api
    runtime: node
    rootDir: apps/api
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/ready
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: HOST
        value: 0.0.0.0
      - key: PORT
        value: 10000
      - key: AUTH_REQUIRE_EMAIL_VERIFICATION
        value: true
      - key: DATABASE_URL
        sync: false
      - key: SESSION_SECRET
        sync: false
      - key: WEB_BASE_URL
        sync: false
      - key: API_BASE_URL
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
      - key: EMAIL_FROM
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: SUPPORT_EMAIL
        sync: false
